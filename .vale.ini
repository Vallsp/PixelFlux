# Vale — prose linter for documentation.
# Run with: task prose   (or: vale .)
MinAlertLevel = warning

[*.md]
BasedOnStyles = Vale
# Spelling and Terms are too noisy for a technical project (tool names like
# Traefik/gitleaks, acronyms like SBOM/CVE…). Keep Vale's other checks
# (e.g. repeated words) which never produce false positives.
Vale.Spelling = NO
Vale.Terms = NO
