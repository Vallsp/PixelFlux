# Git hooks managed by lefthook.
# Install with: task hooks:install   (or `lefthook install`)

pre-commit:
  parallel: true
  commands:
    treefmt:
      glob: "*.{rs,toml,nix,sh,md,yaml,yml,json}"
      run: treefmt {staged_files}
      stage_fixed: true
    clippy:
      glob: "*.rs"
      run: cargo clippy --all-targets --all-features -- -D warnings
    gitleaks:
      run: gitleaks protect --staged --no-banner --redact

commit-msg:
  commands:
    conventional-commit:
      # Enforce Conventional Commits
      run: |
        head -1 "{1}" | grep -Eq '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+' \
          || { echo "Commit message must follow Conventional Commits (e.g. 'feat: add /count endpoint')"; exit 1; }

pre-push:
  parallel: true
  commands:
    test:
      run: cargo test --lib
    build:
      run: cargo build --release
