# yaml-language-server: $schema=https://taskfile.dev/schema.json
# Task runner (go-task). Run `task` with no arguments to list everything.

version: "3"

vars:
  IMAGE_NAME: pixelflux
  IMAGE_VERSION:
    sh: grep '^version' Cargo.toml | head -1 | cut -d'"' -f2
  IMAGE_TAG: "{{.IMAGE_NAME}}:{{.IMAGE_VERSION}}"
  KUBECTL:
    # Prefer k3s (the image is imported into k3s' containerd), so we target the
    # same cluster. Override with: task deploy KUBECTL="kubectl"
    sh: |
      if command -v k3s >/dev/null 2>&1; then
        echo "sudo k3s kubectl"
      elif [ -x /usr/local/bin/k3s ]; then
        echo "sudo /usr/local/bin/k3s kubectl"
      elif command -v kubectl >/dev/null 2>&1; then
        echo kubectl
      else
        echo "sudo /usr/local/bin/k3s kubectl"
      fi

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list
    silent: true

  # --- Setup -------------------------------------------------------------
  hooks:install:
    desc: Install git hooks (lefthook)
    cmds:
      - lefthook install

  lock:
    desc: Generate Cargo.lock (run once after cloning, before container build)
    cmds:
      - cargo generate-lockfile

  # --- Build & run -------------------------------------------------------
  build:
    desc: Compile the project (debug)
    sources:
      - ./src/**/*.rs
      - ./Cargo.*
    cmds:
      - cargo build

  build:static:
    desc: Compile a fully static musl binary
    sources:
      - ./src/**/*.rs
      - ./Cargo.*
    cmds:
      - cargo build --release --target "$(uname -m)-unknown-linux-musl"

  run:
    desc: Run the server locally (PORT=3000)
    cmds:
      - cargo run

  # --- Quality -----------------------------------------------------------
  fmt:
    desc: Auto-format every file type (treefmt)
    cmds:
      - treefmt

  lint:
    desc: Run all linters and quality checks (no changes)
    cmds:
      - treefmt --fail-on-change
      - cargo clippy --all-targets --all-features -- -D warnings
      - yamllint .
      - actionlint
      - markdownlint "**/*.md" --ignore target

  prose:
    desc: Lint documentation prose (Vale)
    cmds:
      - vale .

  links:
    desc: Check docs for broken links (lychee)
    cmds:
      - lychee .

  docs:lint:
    desc: All documentation checks (prose + links)
    cmds:
      - task: prose
      - task: links

  check:
    desc: Full local gate — lint + secrets + tests
    cmds:
      - task: lint
      - task: secrets
      - task: test

  # --- Tests -------------------------------------------------------------
  test:
    desc: Run unit tests
    cmds:
      - cargo test --lib

  test:integration:
    desc: Run integration tests (Testcontainers — needs Docker/Podman)
    cmds:
      - cargo test --test integration -- --nocapture

  test:api:
    desc: API contract tests against a running server (Hurl)
    cmds:
      - |
        cargo build
        ./target/debug/pixelflux &
        SERVER_PID=$!
        trap "kill $SERVER_PID 2>/dev/null" EXIT
        sleep 1
        hurl --test --variable host=http://localhost:3000 api/contract.hurl

  bench:
    desc: Load/benchmark the HTTP server (k6)
    cmds:
      - |
        cargo build --release
        ./target/release/pixelflux &
        SERVER_PID=$!
        trap "kill $SERVER_PID 2>/dev/null" EXIT
        sleep 1
        k6 run load/health.js

  # --- Security ----------------------------------------------------------
  secrets:
    desc: Scan the codebase for leaked credentials (gitleaks)
    cmds:
      - gitleaks detect --no-banner --redact

  # --- Container ---------------------------------------------------------
  container:
    desc: Build the distroless image with Nix
    cmds:
      - nix build .#container

  container:load:
    desc: Build and load the image into the local Docker daemon
    deps:
      - container
    cmds:
      # The Nix image is named pixelflux:latest; retag it with the Cargo version.
      - docker load < result
      - docker tag {{.IMAGE_NAME}}:latest {{.IMAGE_TAG}}
      - 'echo "Loaded {{.IMAGE_TAG}}"'

  container:inspect:
    desc: Inspect image layers / minimality (dive)
    deps:
      - container:load
    cmds:
      - dive {{.IMAGE_TAG}}

  container:size:
    desc: Print image size and fail if it exceeds 20 MB (grading criterion)
    deps:
      - container:load
    cmds:
      - docker images {{.IMAGE_NAME}}
      - |
        BYTES=$(docker image inspect {{.IMAGE_TAG}} --format '{{`{{.Size}}`}}')
        MB=$((BYTES / 1000000))
        echo "Image size: ${MB} MB"
        test "$MB" -lt 20 || { echo "Image exceeds 20 MB!"; exit 1; }

  sbom:
    desc: Generate an SBOM for the container image (Syft)
    deps:
      - container:load
    cmds:
      - syft {{.IMAGE_TAG}} -o spdx-json=sbom.json
      - 'echo "SBOM written to sbom.json"'

  # --- Deploy (k3s + Traefik) -------------------------------------------
  deploy:k3s-install:
    desc: Install k3s on this host (single-node, bundles Traefik). Run once.
    cmds:
      - curl -sfL https://get.k3s.io | sh -

  deploy:image:
    desc: Build the image with Nix and import it into k3s
    cmds:
      - nix build .#container
      - |
        K3S="$(command -v k3s || echo /usr/local/bin/k3s)"
        if [ ! -x "$K3S" ]; then
          echo "k3s not found — install it first with: task deploy:k3s-install"
          exit 1
        fi
        sudo "$K3S" ctr images import result

  deploy:ingress:
    desc: Apply the Traefik IngressRoute (set DOMAIN=yourdomain to change the host)
    vars:
      DOMAIN:
        sh: echo "${DOMAIN:-pixelflux.example.com}"
    cmds:
      - sed 's/pixelflux\.example\.com/{{.DOMAIN}}/g' k8s/ingressroute.yaml | {{.KUBECTL}} apply -f -
      - 'echo "IngressRoute host set to {{.DOMAIN}}"'

  deploy:tls:
    desc: Enable automatic HTTPS (ACME / Let's Encrypt). Set DOMAIN and ACME_EMAIL.
    vars:
      DOMAIN:
        sh: echo "${DOMAIN:-pixelflux.example.com}"
      ACME_EMAIL:
        sh: echo "${ACME_EMAIL:-admin@example.com}"
    cmds:
      - sed 's/admin@example.com/{{.ACME_EMAIL}}/g' k8s/traefik-acme.yaml | {{.KUBECTL}} apply -f -
      - sed 's/pixelflux\.example\.com/{{.DOMAIN}}/g' k8s/ingressroute-tls.yaml | {{.KUBECTL}} apply -f -
      - 'echo "HTTPS enabled for {{.DOMAIN}} (TLS certificate issues in ~1 min on first request)."'

  deploy:
    desc: Build, import, and deploy the app (Redis + fronts + HPA), then expose it
    deps:
      - deploy:image
    cmds:
      - "{{.KUBECTL}} apply -k k8s/"
      - "{{.KUBECTL}} rollout status deploy/pixelflux"
      - "{{.KUBECTL}} get pods,svc,hpa"
      # Expose the app with EITHER deploy:ingress (HTTP) OR deploy:tls (HTTPS).
      # They define the same route, so the last one applied wins — don't mix.
      - 'echo "Expose it -> HTTP:  DOMAIN=you.com task deploy:ingress"'
      - 'echo "            HTTPS: DOMAIN=you.com ACME_EMAIL=you@you.com task deploy:tls"'

  # NOTE: deploy:ingress (HTTP) and deploy:tls (HTTPS) are mutually exclusive —
  # each replaces the "pixelflux" route. After enabling TLS, use deploy:restart
  # (not deploy) for code changes, so the HTTPS route is preserved.

  deploy:restart:
    desc: Rebuild the image and restart the deployment (after a code change)
    deps:
      - deploy:image
    cmds:
      - "{{.KUBECTL}} rollout restart deploy/pixelflux"
      - "{{.KUBECTL}} rollout status deploy/pixelflux"

  deploy:status:
    desc: Show the deployed pixelflux resources
    cmds:
      - "{{.KUBECTL}} get pods,svc,ingressroute,hpa -l app=pixelflux"

  deploy:logs:
    desc: Tail logs from all pixelflux replicas
    cmds:
      - "{{.KUBECTL}} logs -l app=pixelflux --prefix -f"

  deploy:down:
    desc: Remove all deployed resources
    cmds:
      - "{{.KUBECTL}} delete -k k8s/"

  cve:
    desc: Scan the container image for CVEs (Trivy)
    deps:
      - container:load
    cmds:
      - trivy image --exit-code 1 --severity HIGH,CRITICAL {{.IMAGE_TAG}}
