name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, format & secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks needs full history
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Generate lockfile
        run: nix develop -c task lock
      - name: Lint & format check
        run: nix develop -c task lint
      - name: Secret scan
        run: nix develop -c gitleaks detect --no-banner --redact

  test:
    name: Build & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Generate lockfile
        run: nix develop -c task lock
      - name: Build
        run: nix develop -c task build
      - name: Unit tests
        run: nix develop -c task test
      - name: Integration tests (Testcontainers)
        run: nix develop -c task test:integration

  container:
    name: Container build & CVE scan
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Generate lockfile
        run: nix develop -c task lock
      - name: Build distroless image
        run: nix develop -c task container:load
      - name: Image size (< 20 MB)
        run: nix develop -c task container:size
      - name: SBOM
        run: nix develop -c task sbom
      - name: CVE scan (fails on HIGH/CRITICAL)
        run: nix develop -c task cve
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
