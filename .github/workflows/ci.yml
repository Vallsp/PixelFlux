name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, format & secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks needs full history
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Generate lockfile
        run: nix develop -c task lock
      - name: Lint & format check
        run: nix develop -c task lint
      - name: Secret scan
        run: nix develop -c gitleaks detect --no-banner --redact

  test:
    name: Build & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Generate lockfile
        run: nix develop -c task lock
      - name: Build
        run: nix develop -c task build
      - name: Unit tests
        run: nix develop -c task test
      - name: Integration tests (Testcontainers)
        run: nix develop -c task test:integration

  container:
    name: Container build, scan & publish
    runs-on: ubuntu-latest
    needs: [quality, test]
    permissions:
      contents: read
      packages: write # push the image to GHCR (job-scoped; other jobs stay read-only)
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Generate lockfile
        run: nix develop -c task lock
      - name: Build distroless image
        run: nix develop -c task container:load
      - name: Image size (< 20 MB)
        run: nix develop -c task container:size
      - name: SBOM
        run: nix develop -c task sbom
      - name: CVE scan (fails on HIGH/CRITICAL)
        run: nix develop -c task cve
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      # Publish the just-scanned image to GHCR — only on pushes to main
      # (PRs/forks lack packages:write on GITHUB_TOKEN, so they skip this).
      - name: Image metadata
        id: img
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          owner=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          echo "repo=ghcr.io/${owner}/pixelflux" >> "$GITHUB_OUTPUT"
          echo "version=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: echo "$GH_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin

      - name: Tag & push to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          REPO: ${{ steps.img.outputs.repo }}
          VERSION: ${{ steps.img.outputs.version }}
        run: |
          SHA_TAG="sha-${GITHUB_SHA::12}"
          for TAG in "$VERSION" "$SHA_TAG" latest; do
            docker tag pixelflux:latest "$REPO:$TAG"
            docker push "$REPO:$TAG"
          done
          echo "Pushed $REPO ($VERSION, $SHA_TAG, latest)"

  docs:
    name: Documentation (Vale + links)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Build docs site (mdBook)
        run: nix develop -c task docs:build
      - name: Prose (Vale)
        run: nix develop -c task prose
      - name: Links (lychee)
        run: nix develop -c task links
        continue-on-error: true # external links can be flaky

  deploy-docs:
    name: Publish docs to GitHub Pages
    runs-on: ubuntu-latest
    needs: [docs]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write # deploy to Pages (job-scoped; other jobs stay read-only)
      id-token: write # OIDC token the deploy-pages action verifies
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Build docs site
        run: nix develop -c task docs:build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book/out
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
