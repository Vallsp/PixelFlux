openapi: 3.1.0
info:
  title: Pixelflux — collaborative pixel canvas API
  version: 0.1.0
  description: Collaborative pixel canvas used for the SDLC tooling workshop (TP4).
  license:
    name: MIT
servers:
  - url: http://localhost:3000
paths:
  /:
    get:
      summary: Web UI (embedded single page)
      operationId: getIndex
      responses:
        "200":
          description: HTML page
          content:
            text/html:
              schema:
                type: string
  /health:
    get:
      summary: Liveness probe
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, example: ok }
  /info:
    get:
      summary: Build information
      operationId: getInfo
      responses:
        "200":
          description: Name and version of the running binary
          content:
            application/json:
              schema:
                type: object
                required: [name, version, instance, online]
                properties:
                  name: { type: string, example: pixelflux }
                  version: { type: string, example: 0.3.0 }
                  instance: { type: string, example: pixelflux-7d9c8-abcde }
                  online:
                    type: integer
                    description: Live viewers (open SSE connections), shared across replicas
                    example: 3
  /api/canvas:
    get:
      summary: Get the whole canvas
      operationId: getCanvas
      responses:
        "200":
          description: Canvas dimensions, palette, and pixel data
          content:
            application/json:
              schema:
                type: object
                required: [width, height, palette, pixels]
                properties:
                  width: { type: integer, example: 200 }
                  height: { type: integer, example: 200 }
                  palette:
                    type: array
                    items: { type: string }
                    description: Default preset colours for the UI (pixels can be any RGB)
                  pixels:
                    type: string
                    description: width*height*6 hex chars — an rrggbb RGB colour per pixel
  /register:
    post:
      summary: Issue a paint token
      description: >-
        Returns a random token (UUID v4) to send as the `X-Token` header when
        painting. Deliberately slow (~5s) to make mass token creation expensive.
      operationId: register
      responses:
        "200":
          description: A new token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
  /api/pixel:
    post:
      summary: Paint a single pixel
      operationId: setPixel
      parameters:
        - in: header
          name: X-Token
          required: true
          schema: { type: string }
          description: A token obtained from POST /register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [x, y, color]
              properties:
                x: { type: integer, minimum: 0, maximum: 199 }
                y: { type: integer, minimum: 0, maximum: 199 }
                color:
                  type: string
                  pattern: "^#?[0-9a-fA-F]{6}$"
                  description: RGB colour, 6 hex digits (with or without a leading '#')
                  example: e50000
      responses:
        "200":
          description: Pixel painted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
        "400":
          description: Invalid coordinates or colour
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: false }
                  error:
                    type: string
                    example: coordinates (99, 0) out of bounds (200×200)
        "401":
          description: Missing or unknown token (register first)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: false }
                  error: { type: string }
        "429":
          description: Rate limit exceeded (max 4096 pixels per 30s per token)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: false }
                  error: { type: string }
  /api/events:
    get:
      summary: Live pixel updates (Server-Sent Events)
      operationId: streamEvents
      parameters:
        - in: query
          name: cid
          required: false
          schema: { type: string }
          description: >-
            Stable per-tab connection id so reconnects don't inflate the live
            viewer count. Generated server-side if omitted.
      responses:
        "200":
          description: text/event-stream of painted pixels
          content:
            text/event-stream:
              schema:
                type: string
                description: >-
                  Each event's data is a coalesced batch — a JSON array
                  [{"x":int,"y":int,"color":int}, ...] flushed on a fixed tick
                  (default 16ms, SSE_COALESCE_MS).
