openapi: 3.1.0
info:
  title: Pixelflux — collaborative pixel canvas API
  version: 0.1.0
  description: Collaborative pixel canvas used for the SDLC tooling workshop (TP4).
  license:
    name: MIT
servers:
  - url: http://localhost:3000
paths:
  /:
    get:
      summary: Web UI (embedded single page)
      operationId: getIndex
      responses:
        "200":
          description: HTML page
          content:
            text/html:
              schema:
                type: string
  /health:
    get:
      summary: Liveness probe
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, example: ok }
  /info:
    get:
      summary: Build information
      operationId: getInfo
      responses:
        "200":
          description: Name and version of the running binary
          content:
            application/json:
              schema:
                type: object
                required:
                  [name, version, instance, online, paused, registration_open]
                properties:
                  name: { type: string, example: pixelflux }
                  version: { type: string, example: 0.5.0 }
                  instance: { type: string, example: pixelflux-7d9c8-abcde }
                  online:
                    type: integer
                    description: Live viewers (open SSE connections), shared across replicas
                    example: 3
                  paused:
                    type: boolean
                    description: True when an admin has enabled read-only maintenance mode
                    example: false
                  registration_open:
                    type: boolean
                    description: Whether new visitors can currently register a token
                    example: true
                  maintenance_message:
                    type: string
                    description: Banner text to show while paused
                  announcement:
                    type: string
                    description: Site-wide announcement (empty = none)
  /api/canvas:
    get:
      summary: Get the whole canvas
      operationId: getCanvas
      responses:
        "200":
          description: Canvas dimensions, palette, and pixel data
          content:
            application/json:
              schema:
                type: object
                required: [width, height, palette, picker, enforce, pixels]
                properties:
                  width: { type: integer, example: 200 }
                  height: { type: integer, example: 200 }
                  palette:
                    type: array
                    items: { type: string }
                    description: Default preset colours for the UI (pixels can be any RGB)
                  picker:
                    type: boolean
                    description: Whether the UI offers the native colour picker (admin toggle)
                    example: true
                  enforce:
                    type: boolean
                    description: Whether only palette colours are accepted (server-enforced)
                    example: false
                  pixels:
                    type: string
                    description: width*height*6 hex chars — an rrggbb RGB colour per pixel
  /register:
    post:
      summary: Register a player and issue a paint token
      description: >-
        Reserves a **unique** pseudo and returns a random token (UUID v4) bound
        to it server-side. Send the token as the `X-Token` header when painting;
        the pseudo credited in the leaderboard is derived from the token, so it
        cannot be spoofed from a paint request. Deliberately slow (~5s) to make
        mass token creation expensive.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [player]
              properties:
                player:
                  type: string
                  description: Desired pseudo (sanitised server-side; max 20 chars)
                  example: Alice
      responses:
        "200":
          description: A new token bound to the (sanitised) pseudo
          content:
            application/json:
              schema:
                type: object
                required: [token, name]
                properties:
                  token:
                    type: string
                    example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
                  name:
                    type: string
                    description: The sanitised pseudo actually bound to the token
                    example: Alice
        "400":
          description: Invalid (empty after sanitisation) pseudo
        "409":
          description: Pseudo already taken
        "503":
          description: Registration is closed by an admin
  /api/pixel:
    post:
      summary: Paint a single pixel
      operationId: setPixel
      parameters:
        - in: header
          name: X-Token
          required: true
          schema: { type: string }
          description: A token obtained from POST /register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [x, y, color]
              properties:
                x: { type: integer, minimum: 0, maximum: 199 }
                y: { type: integer, minimum: 0, maximum: 199 }
                color:
                  type: string
                  pattern: "^#?[0-9a-fA-F]{6}$"
                  description: RGB colour, 6 hex digits (with or without a leading '#')
                  example: e50000
      responses:
        "200":
          description: Pixel painted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
        "400":
          description: >-
            Invalid coordinates or colour, or — when palette enforcement is on —
            a colour that is not in the configured palette.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: false }
                  error:
                    type: string
                    example: coordinates (99, 0) out of bounds (200×200)
        "401":
          description: Missing or unknown token (register first)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: false }
                  error: { type: string }
        "429":
          description: >-
            Rate limit exceeded. The budget (pixels per window) is configurable
            from the admin page; it defaults to 4096 pixels per 30s per token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: false }
                  error: { type: string }
        "503":
          description: Canvas is in maintenance mode (read-only), set by an admin
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: false }
                  error: { type: string }
  /api/events:
    get:
      summary: Live pixel updates (Server-Sent Events)
      operationId: streamEvents
      parameters:
        - in: query
          name: cid
          required: false
          schema: { type: string }
          description: >-
            Stable per-tab connection id so reconnects don't inflate the live
            viewer count. Generated server-side if omitted.
      responses:
        "200":
          description: text/event-stream of painted pixels
          content:
            text/event-stream:
              schema:
                type: string
                description: >-
                  Each event's data is a coalesced batch — a JSON array
                  [{"x":int,"y":int,"color":int}, ...] flushed on a fixed tick
                  (default 16ms, SSE_COALESCE_MS). A reset event is the object
                  {"clear":true}. A named `leaderboard` event carries the top-10.
  /api/leaderboard:
    get:
      summary: Top players by pixels painted
      description: >-
        Top-10 players by cumulative pixels painted. Names are the pseudos bound
        to tokens at registration. Also pushed live as a named `leaderboard` SSE
        event on `/api/events`.
      operationId: getLeaderboard
      responses:
        "200":
          description: Ranked list, highest first
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [name, count]
                  properties:
                    name: { type: string, example: Alice }
                    count: { type: integer, example: 128 }
  /api/ownership:
    get:
      summary: Territory standings (current pixel ownership)
      description: >-
        How many pixels each player currently owns and their share of the whole
        canvas. Unlike the cumulative leaderboard, ownership is transferred when
        a pixel is overwritten.
      operationId: getOwnership
      responses:
        "200":
          description: Total canvas pixels and the top owners
          content:
            application/json:
              schema:
                type: object
                required: [total, entries]
                properties:
                  total:
                    type: integer
                    description: Total pixels on the canvas (width * height)
                    example: 40000
                  entries:
                    type: array
                    items:
                      type: object
                      required: [name, count, percent]
                      properties:
                        name: { type: string, example: Alice }
                        count: { type: integer, example: 512 }
                        percent: { type: number, example: 1.28 }
  /admin:
    get:
      summary: Admin dashboard (HTML)
      description: >-
        Single-page admin UI. Requires the server to be started with the
        ADMIN_PASSWORD environment variable; otherwise all /admin/api endpoints
        return 401. Authentication is a session cookie set by POST /admin/login.
      operationId: getAdmin
      responses:
        "200":
          description: HTML page
          content:
            text/html:
              schema: { type: string }
  /admin/login:
    post:
      summary: Open an admin session
      operationId: adminLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string }
      responses:
        "200":
          description: >-
            Authenticated. Sets an HttpOnly, SameSite=Strict `admin_session`
            cookie used by the other /admin/api endpoints.
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
        "401":
          description: Invalid password or admin disabled
  /admin/logout:
    post:
      summary: Close the admin session
      operationId: adminLogout
      responses:
        "200":
          description: Session invalidated and cookie cleared
  /admin/api/state:
    get:
      summary: Current settings + live stats
      operationId: adminState
      responses:
        "200":
          description: Settings, stats and instance info
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings: { $ref: "#/components/schemas/Settings" }
                  stats:
                    type: object
                    properties:
                      pixels_painted: { type: integer }
                      tokens_issued: { type: integer }
                      online: { type: integer }
                  version: { type: string }
                  instance: { type: string }
                  width: { type: integer, example: 200 }
                  height: { type: integer, example: 200 }
        "401":
          description: Not authenticated
  /admin/api/settings:
    put:
      summary: Update runtime settings (applied fleet-wide)
      operationId: adminUpdateSettings
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Settings" }
      responses:
        "200":
          description: The applied settings (server clamps out-of-range values)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Settings" }
        "401":
          description: Not authenticated
  /admin/api/canvas/clear:
    post:
      summary: Reset the canvas to white
      operationId: adminClearCanvas
      responses:
        "200":
          description: Canvas wiped; a clear event is broadcast to all clients
        "401":
          description: Not authenticated
  /admin/api/players/delete:
    post:
      summary: Remove a player
      description: >-
        Revoke the token bound to the given pseudo, free the pseudo reservation,
        and drop the player from the leaderboard. The refreshed top-10 is pushed
        to all clients.
      operationId: adminDeletePlayer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, example: Alice }
      responses:
        "200":
          description: Player removed (idempotent if the pseudo didn't exist)
        "401":
          description: Not authenticated
  /admin/api/tokens/revoke-unbound:
    post:
      summary: Revoke legacy tokens with no bound pseudo
      description: >-
        Deletes every token that isn't backed by a matching pseudo reservation
        (e.g. tokens issued before pseudo↔token binding). Returns how many were
        revoked.
      operationId: adminRevokeUnbound
      responses:
        "200":
          description: Count of revoked tokens
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  revoked: { type: integer, example: 3 }
        "401":
          description: Not authenticated
components:
  schemas:
    Settings:
      type: object
      required:
        - rate_limit
        - rate_window_secs
        - register_delay_secs
        - token_ttl_secs
        - online_heartbeat_secs
        - online_ttl_secs
        - paused
      properties:
        width:
          type: integer
          description: Canvas width in pixels (8–512). Changing it resets the canvas.
          example: 200
        height:
          type: integer
          description: Canvas height in pixels (8–512). Changing it resets the canvas.
          example: 200
        rate_limit_enabled:
          type: boolean
          description: Master switch for the paint budget; false = unlimited painting
          example: true
        rate_limit:
          type: integer
          description: Max pixels per token per window (1–1000000)
          example: 4096
        rate_window_secs:
          type: integer
          description: Rate-limit window in seconds (1–3600)
          example: 30
        register_delay_secs:
          type: integer
          description: Anti-abuse delay when issuing a token, seconds (0–60)
          example: 5
        token_ttl_secs:
          type: integer
          description: Token validity in seconds (60–2592000)
          example: 86400
        online_heartbeat_secs:
          type: integer
          description: Viewer heartbeat interval, seconds (1–300)
          example: 5
        online_ttl_secs:
          type: integer
          description: Viewer entry expiry, seconds (2–600)
          example: 15
        sse_coalesce_ms:
          type: integer
          description: SSE coalescing window in ms (1–1000); higher = less server fan-out
          example: 16
        palette:
          type: array
          items: { type: string }
          description: Preset swatch colours (#rrggbb), max 64; invalid entries dropped
        color_picker_enabled:
          type: boolean
          description: When false, the UI hides the native colour picker (presets only)
          example: true
        enforce_palette:
          type: boolean
          description: When true, the server rejects any pixel colour not in the palette (400)
          example: false
        registration_open:
          type: boolean
          description: When false, POST /register returns 503 (no new tokens)
          example: true
        maintenance_message:
          type: string
          description: Banner text shown to visitors while paused (max 200 chars)
        announcement:
          type: string
          description: Site-wide announcement banner; empty = none (max 200 chars)
        paused:
          type: boolean
          description: Maintenance mode — when true, painting returns 503
          example: false
