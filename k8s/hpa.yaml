# Horizontal Pod Autoscaler — automatically runs more UI replicas under load.
# Requires metrics-server in the cluster (bundled with k3s).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pixelflux
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pixelflux
  minReplicas: 3
  maxReplicas: 100
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# Keep at least 2 UI replicas available during voluntary disruptions
# (node drains, rollouts), so the front is never fully down.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pixelflux
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: pixelflux
