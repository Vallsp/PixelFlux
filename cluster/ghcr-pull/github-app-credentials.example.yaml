# Credentials for the GHCR pull-secret refresher (see README.md).
#
# DO NOT commit a filled-in copy. Prefer creating it imperatively so the key
# never lands in a file you might accidentally commit:
#
#   kubectl create secret generic github-app-credentials -n pixelflux \
#     --from-literal=appId=123456 \
#     --from-literal=installationId=7891011 \
#     --from-file=privateKey=/path/to/app-private-key.pem
#
# This manifest is only a reference for the expected keys.
apiVersion: v1
kind: Secret
metadata:
  name: github-app-credentials
  namespace: pixelflux
type: Opaque
stringData:
  appId: "REPLACE_APP_ID"
  installationId: "REPLACE_INSTALLATION_ID"
  # Paste the GitHub App private key (.pem) contents here.
  privateKey: "REPLACE_WITH_PEM_CONTENTS"
