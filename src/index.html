<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pixelflux — collaborative pixel canvas</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        padding: 1.5rem;
        font-family: system-ui, sans-serif;
        background: #0f1115;
        color: #e6e6e6;
      }
      h1 {
        margin: 0;
        font-size: 1.4rem;
      }
      p.sub {
        margin: 0;
        color: #9aa0aa;
        font-size: 0.9rem;
        text-align: center;
      }
      #palette {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: center;
        max-width: 620px;
      }
      .swatch {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        cursor: pointer;
        border: 2px solid transparent;
        transition: transform 0.08s;
      }
      .swatch.active {
        border-color: #fff;
        transform: scale(1.12);
      }
      #grid {
        display: grid;
        gap: 1px;
        padding: 1px;
        background: #2a2f3a;
        border-radius: 6px;
        touch-action: none;
        user-select: none;
      }
      .cell {
        width: 9px;
        height: 9px;
        cursor: crosshair;
      }
      .cell:hover {
        outline: 2px solid #ffffffaa;
        outline-offset: -2px;
      }
      .links {
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      .links a {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.45rem 0.85rem;
        border-radius: 8px;
        border: 1px solid #2a2f3a;
        background: #171a21;
        color: #e6e6e6;
        text-decoration: none;
        font-size: 0.85rem;
        transition: background 0.12s, border-color 0.12s, transform 0.08s;
      }
      .links a:hover {
        background: #1f242e;
        border-color: #3a414f;
        transform: translateY(-1px);
      }
      .links svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
      }
      footer {
        color: #6b7280;
        font-size: 0.8rem;
      }
      #status {
        color: #94e044;
      }
    </style>
  </head>
  <body>
    <h1>🎨 Pixelflux</h1>
    <p class="sub">
      Pick a colour, click or drag on the grid to paint.
    </p>
    <div id="palette"></div>
    <div id="grid"></div>
    <nav class="links">
      <a href="https://vallsp.github.io/PixelFlux/" target="_blank" rel="noopener">
        <svg viewBox="0 0 16 16" aria-hidden="true">
          <path d="M0 1.75A.75.75 0 0 1 .75 1h4.253c1.227 0 2.317.59 3 1.501A3.743 3.743 0 0 1 11.006 1h4.245a.75.75 0 0 1 .75.75v10.5a.75.75 0 0 1-.75.75h-4.507a2.25 2.25 0 0 0-1.591.659l-.622.621a.75.75 0 0 1-1.06 0l-.622-.621A2.25 2.25 0 0 0 5.258 13H.75a.75.75 0 0 1-.75-.75Zm7.251 10.324.004-5.073-.002-2.253A2.25 2.25 0 0 0 5.003 2.5H1.5v9h3.757a3.75 3.75 0 0 1 1.994.574ZM8.755 4.75l-.004 7.322a3.752 3.752 0 0 1 1.992-.572H14.5v-9h-3.495a2.25 2.25 0 0 0-2.25 2.25Z"/>
        </svg>
        Docs
      </a>
      <a href="https://github.com/Vallsp/PixelFlux" target="_blank" rel="noopener">
        <svg viewBox="0 0 16 16" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
        </svg>
        GitHub
      </a>
    </nav>
    <footer>Pixelflux · v<span id="version">—</span> · status: <span id="status">connecting…</span> · served by <span id="instance">—</span></footer>

    <script>
      const PIXEL = 9;
      let WIDTH = 64,
        HEIGHT = 64,
        PALETTE = [],
        selected = 5,
        painting = false,
        cells = [];

      const grid = document.getElementById("grid");
      const paletteEl = document.getElementById("palette");
      const statusEl = document.getElementById("status");

      function buildPalette() {
        paletteEl.innerHTML = "";
        PALETTE.forEach((color, i) => {
          const s = document.createElement("div");
          s.className = "swatch" + (i === selected ? " active" : "");
          s.style.background = color;
          s.title = "#" + i.toString(16);
          s.onclick = () => {
            selected = i;
            document
              .querySelectorAll(".swatch")
              .forEach((el, idx) => el.classList.toggle("active", idx === selected));
          };
          paletteEl.appendChild(s);
        });
      }

      function buildGrid() {
        grid.style.gridTemplateColumns = `repeat(${WIDTH}, ${PIXEL}px)`;
        grid.innerHTML = "";
        cells = [];
        for (let y = 0; y < HEIGHT; y++) {
          for (let x = 0; x < WIDTH; x++) {
            const c = document.createElement("div");
            c.className = "cell";
            c.onmousedown = () => {
              painting = true;
              paint(x, y);
            };
            c.onmouseenter = () => {
              if (painting) paint(x, y);
            };
            grid.appendChild(c);
            cells.push(c);
          }
        }
      }

      function setCell(i, idx) {
        if (cells[i]) cells[i].style.background = PALETTE[idx] || PALETTE[0];
      }

      function render(pixels) {
        for (let i = 0; i < cells.length; i++) {
          setCell(i, parseInt(pixels[i], 16) || 0);
        }
      }

      async function fullSync() {
        try {
          const r = await fetch("/api/canvas");
          const data = await r.json();
          WIDTH = data.width;
          HEIGHT = data.height;
          PALETTE = data.palette;
          if (cells.length !== WIDTH * HEIGHT) {
            buildPalette();
            buildGrid();
          }
          render(data.pixels);
        } catch (e) {
          /* keep current view */
        }
      }

      async function paint(x, y) {
        cells[y * WIDTH + x].style.background = PALETTE[selected]; // optimistic
        await fetch("/api/pixel", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ x, y, color: selected }),
        });
      }

      function connect() {
        const es = new EventSource("/api/events");
        es.onopen = () => {
          statusEl.textContent = "live";
          statusEl.style.color = "#94e044";
        };
        es.onmessage = (ev) => {
          const { x, y, color } = JSON.parse(ev.data);
          setCell(y * WIDTH + x, color);
        };
        es.onerror = () => {
          statusEl.textContent = "reconnecting…";
          statusEl.style.color = "#e59500";
          // EventSource auto-reconnects; resync once back.
        };
      }

      window.addEventListener("mouseup", () => (painting = false));

      async function refreshInstance() {
        try {
          const r = await fetch("/info");
          const d = await r.json();
          // Traefik round-robins, so the instance shown changes between calls.
          document.getElementById("instance").textContent = d.instance;
          document.getElementById("version").textContent = d.version;
        } catch (e) {
          /* keep last value */
        }
      }

      (async function start() {
        await fullSync();
        connect();
        refreshInstance();
        // Safety-net reconciliation (covers multi-instance / missed events).
        setInterval(fullSync, 10000);
        // Show which replica answers (makes load balancing visible).
        setInterval(refreshInstance, 3000);
      })();
    </script>
  </body>
</html>
