# Argo CD Application — GitOps delivery for PixelFlux.
#
# Argo CD watches the k8s/ kustomization in this repo and continuously syncs
# the cluster to match `main`. Apply this once into a cluster that already runs
# Argo CD (in the `argocd` namespace):
#
#   kubectl apply -f argocd/application.yaml
#
# From then on, every push to main is rolled out automatically (prune +
# selfHeal). Everything lands in the `pixelflux` namespace, created on first
# sync — so use this *instead of* `task deploy` (which applies into the current
# kubeconfig namespace); run `task deploy:down` first if you already deployed
# manually, to avoid two copies.
#
# The kustomization deploys HTTPS end-to-end (HTTP->HTTPS redirect + a TLS route
# with a Let's Encrypt cert, plus the ACME resolver for the k3s Traefik). The
# hostname is set per cluster via the kustomize patches in spec.source.kustomize
# below — edit the Host(...) values at setup time. The shared k8s/ base keeps the
# pixelflux.example.com placeholder, so the domain lives only here.
#
# Argo CD syncs *manifests, not images*. The kustomize `images:` override below
# points the app at the CI-published image on GHCR. Both the repo and the GHCR
# package are public, so no git credential and no image pull secret are needed —
# `task k3s:up` just installs Argo CD and applies this file.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pixelflux
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # Public repo — cloned over anonymous HTTPS, no deploy key required.
    repoURL: https://github.com/Vallsp/PixelFlux.git
    targetRevision: main
    path: k8s
    kustomize:
      # Pull the CI-published image from GHCR instead of the base's local
      # `pixelflux:latest`; the shared k8s/ base stays usable for local k3s.
      images:
        - pixelflux=ghcr.io/vallsp/pixelflux:0.1.0
      # Per-cluster ingress host on BOTH routes — the HTTP->HTTPS redirect
      # (`pixelflux-web`) and the TLS route (`pixelflux`). The pixelflux.example.com
      # placeholder is replaced with your real DOMAIN at apply time by the bring-up
      # script (cluster/k3s-up.sh reads cluster/config.env). Edit config.env, not
      # this file.
      patches:
        - target:
            kind: IngressRoute
            name: pixelflux
          patch: |-
            - op: replace
              path: /spec/routes/0/match
              value: Host(`pixelflux.example.com`) || Host(`www.pixelflux.example.com`)
        - target:
            kind: IngressRoute
            name: pixelflux-web
          patch: |-
            - op: replace
              path: /spec/routes/0/match
              value: Host(`pixelflux.example.com`) || Host(`www.pixelflux.example.com`)
  destination:
    server: https://kubernetes.default.svc
    namespace: pixelflux
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
